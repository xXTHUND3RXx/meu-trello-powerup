<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sublistas - Conector</title>
  <!-- URL oficial da biblioteca do Power-Up. NÃO trocar. -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Ícone cinza embutido (checkmark) só pra não depender de outro arquivo.
    // Se quiser, troque por uma URL https para um PNG/SVG 144x144 seu.
    var ICON = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%236b778c' d='M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z'/></svg>";

    TrelloPowerUp.initialize({
      'card-back-section': function (t, options) {
        return {
          title: 'Sublistas Personalizadas',
          icon: ICON,
          content: {
            type: 'iframe',
            // t.signUrl assina a URL para o Trello confiar nela.
            // Caminho relativo: precisa estar na mesma pasta no GitHub Pages.
            url: t.signUrl('./checklist.html'),
            height: 240
          }
        };
      }
    });
  </script>
</body>
</html>
