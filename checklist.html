<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sublistas</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { font-family: sans-serif; color: #172b4d; margin: 0; padding: 10px; background: transparent; }
    .input-box { display: flex; gap: 8px; margin-bottom: 10px; }
    input { flex-grow: 1; padding: 6px; border: 1px solid #dfe1e6; border-radius: 3px; box-sizing: border-box; }
    button { background: #0079bf; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-weight: bold; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #00000014; }
    .item label { display: flex; align-items: center; gap: 6px; }
    .done span { text-decoration: line-through; color: #6b778c; }
    .btn-del { background: #eb5a46; font-size: 11px; padding: 2px 6px; }
  </style>
</head>
<body>
  <div class="input-box">
    <input type="text" id="new-item" placeholder="Adicionar nova subtarefa...">
    <button id="add-btn">+</button>
  </div>
  <div id="list"></div>

   <script>

var t = TrelloPowerUp.iframe();

t.card('id', 'name')
.then(function(card){

    document.body.innerHTML =
        '<h3>Teste OK</h3>' +
        '<pre>' +
        JSON.stringify(card, null, 2) +
        '</pre>';

})
.catch(function(err){

    document.body.innerHTML =
        '<pre>ERRO:\n' +
        err +
        '</pre>';

});

</script>

</body>
</html>
