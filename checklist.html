<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DeepLists Clone V2</title>

<script src="https://p.trellocdn.com/power-up.min.js"></script>

<style>

body{
    margin:0;
    padding:12px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:#172b4d;
    background:#fff;
}

.checklist{
    margin-bottom:24px;
}

.checklist-title{
    font-size:16px;
    font-weight:600;
    margin-bottom:10px;
    border-bottom:1px solid #dfe1e6;
    padding-bottom:6px;
}

.task{
    background:#f4f5f7;
    border-radius:8px;
    padding:8px;
    margin-bottom:8px;
}

.task-complete{
    background:#e3fcef;
}

.task-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.task-name{
    font-weight:500;
}

.btn{
    border:none;
    border-radius:4px;
    cursor:pointer;
    padding:4px 8px;
}

.btn-add{
    background:#0079bf;
    color:white;
}

.subtasks{
    margin-top:8px;
    margin-left:24px;
}

.subtask{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:4px 0;
}

.subtask-left{
    display:flex;
    align-items:center;
    gap:6px;
}

.btn-del{
    background:#eb5a46;
    color:white;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-content{
    background:white;
    padding:16px;
    width:320px;
    border-radius:8px;
}

.modal input{
    width:100%;
    box-sizing:border-box;
    padding:8px;
    margin-bottom:10px;
}

.empty{
    color:#5e6c84;
}

</style>
</head>
<body>

<div id="app">Carregando...</div>

<div class="modal" id="modal">
    <div class="modal-content">

        <h3>Nova Subtarefa</h3>

        <input id="subtaskName"
               placeholder="Nome da subtarefa">

        <button class="btn btn-add"
                onclick="salvarSubtarefa()">
            Salvar
        </button>

        <button class="btn"
                onclick="fecharModal()">
            Cancelar
        </button>

    </div>
</div>

<script>

const API_KEY = '3b120e2d0d7f28b68c09a418636ca6c4';
const TOKEN = 'ATTA5a6eeba5755e938a555f9dd37ef28f27dfeb9659e9b13a13708f9bb8c13b86348D3EDE3F';

const t = TrelloPowerUp.iframe();

let cardId = null;
let currentParentId = null;

async function getStorage(){
    return await t.get(
        'card',
        'shared',
        'deeplists',
        {}
    );
}

async function setStorage(data){
    await t.set(
        'card',
        'shared',
        'deeplists',
        data
    );
}

async function atualizarChecklistNativa(parentId, concluido) {
    await fetch(
        `https://api.trello.com/1/cards/${cardId}/checkItem/${parentId}` +
        `?key=${API_KEY}` +
        `&token=${TOKEN}` +
        `&state=${concluido ? 'complete' : 'incomplete'}`,
        {
            method: 'PUT'
        }
    );
}

function abrirModal(parentId){

    currentParentId = parentId;

    document.getElementById('subtaskName').value='';

    document.getElementById('modal').style.display='flex';
}

function fecharModal(){

    currentParentId = null;

    document.getElementById('modal').style.display='none';
}

async function salvarSubtarefa(){

    const nome =
        document.getElementById('subtaskName')
        .value.trim();

    if(!nome) return;

    const storage =
        await getStorage();

    if(!storage[currentParentId]){
        storage[currentParentId]=[];
    }

    storage[currentParentId].push({
        id:Date.now().toString(),
        text:nome,
        done:false
    });

    await setStorage(storage);

    fecharModal();

    await carregar();
}

async function excluirSubtarefa(parentId,subId){

    const storage =
        await getStorage();

    storage[parentId] =
        (storage[parentId]||[])
        .filter(x=>x.id!==subId);

    await setStorage(storage);


    await carregar();
}

async function toggleSubtarefa(parentId, subId){

    const storage = await getStorage();

    const lista = storage[parentId] || [];

    const item = lista.find(x => x.id === subId);

    if(!item) return;

    item.done = !item.done;

    await setStorage(storage);

    // verifica se todas as subtarefas foram concluídas
    const todasConcluidas =
        lista.length > 0 &&
        lista.every(x => x.done);

    // sincroniza com o Trello
    await atualizarChecklistNativa(
        parentId,
        todasConcluidas
    );

    await carregar();
}


async function carregar(){

    const card =
        await t.card('id','name');

    cardId = card.id;

    const response =
        await fetch(
            `https://api.trello.com/1/cards/${card.id}/checklists?key=${API_KEY}&token=${TOKEN}`
        );

    const checklists =
        await response.json();

    const storage =
        await getStorage();

    const app =
        document.getElementById('app');

    app.innerHTML='';

    if(!checklists.length){

        app.innerHTML =
            '<div class="empty">Nenhum checklist encontrado.</div>';

        return;
    }

    checklists.forEach(checklist=>{

        let html='';

        html += `
        <div class="checklist">

            <div class="checklist-title">
                📋 ${checklist.name}
            </div>
        `;

        checklist.checkItems.forEach(item=>{

            const subs =
    storage[item.id] || [];

const totalSubs =
    subs.length;

const concluidas =
    subs.filter(x => x.done).length;

const todasConcluidas =
    totalSubs > 0 &&
    concluidas === totalSubs;

            html += `
            <div class="task">

                <div class="task-header">

                    <div class="task-name">

                        <input
                            type="checkbox"
                            ${todasConcluidas ? 'checked' : ''}
                            onchange="togglePai('${item.id}')">

                        ${item.name}

                    </div>

                    <button
                        class="btn btn-add"
                        onclick="abrirModal('${item.id}')">
                        + Subtarefa
                    </button>

                </div>

                <div class="subtasks">
            `;

            

            subs.forEach(sub=>{

                html += `
                <div class="subtask">

                    <div class="subtask-left">

                        <input
                            type="checkbox"
                            ${sub.done?'checked':''}
                            onchange="
                                toggleSubtarefa(
                                    '${item.id}',
                                    '${sub.id}'
                                )
                            ">

                        <span>
                            ${sub.text}
                        </span>

                    </div>

                    <button
                        class="btn btn-del"
                        onclick="
                            excluirSubtarefa(
                                '${item.id}',
                                '${sub.id}'
                            )
                        ">
                        X
                    </button>

                </div>
                `;
            });

            html += `
                </div>
            </div>
            `;
        });

        html += '</div>';

        app.innerHTML += html;
    });

    t.sizeTo('body');
}

async function togglePai(parentId){

    const storage = await getStorage();

    const lista = storage[parentId] || [];

    if(lista.length === 0){
        return;
    }

    const todasMarcadas =
        lista.every(x => x.done);

    // marca ou desmarca todas as subtarefas
    lista.forEach(sub => {
        sub.done = !todasMarcadas;
    });

    storage[parentId] = lista;

    await setStorage(storage);

    // sincroniza com o checklist nativo do Trello
    await atualizarChecklistNativa(
        parentId,
        !todasMarcadas
    );

    await carregar();
}

// ------------------------------
// Atualização automática
// ------------------------------

let carregando = false;

async function atualizarInterface() {

    if (carregando) {
        return;
    }

    carregando = true;

    try {

        await carregar();

    } catch (err) {

        document.getElementById('app').innerHTML =
            '<pre style="white-space:pre-wrap;color:red;">' +
            (err.stack ||
             err.message ||
             JSON.stringify(err, null, 2)) +
            '</pre>';

    } finally {

        carregando = false;

    }

}

// Primeira carga
atualizarInterface();

// Quando o Trello solicitar uma nova renderização
t.render(async () => {

    await atualizarInterface();

    return t.sizeTo('body');

});

// Atualização automática a cada 2 segundos
setInterval(() => {

    atualizarInterface();

}, 2000);

</script>

</body>
</html>
