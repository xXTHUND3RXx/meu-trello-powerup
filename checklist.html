<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DeepLists Clone</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    margin:0;
    padding:12px;
    background:#fff;
    color:#172b4d;
}

.loading{
    color:#5e6c84;
}

.checklist{
    margin-bottom:20px;
}

.checklist-title{
    font-size:16px;
    font-weight:600;
    margin-bottom:10px;
    padding-bottom:6px;
    border-bottom:1px solid #dfe1e6;
}

.task{
    padding:8px;
    border-radius:6px;
    margin-bottom:6px;
    background:#f4f5f7;
}

.task-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.task-name{
    font-weight:500;
}

.subtasks{
    margin-left:24px;
    margin-top:8px;
}

.subtask{
    padding:4px 0;
    color:#5e6c84;
}

.subtask::before{
    content:"↳ ";
}

.progress{
    font-size:12px;
    color:#5e6c84;
    margin-bottom:10px;
}

.empty{
    color:#5e6c84;
    font-style:italic;
}

</style>
</head>
<body>

<div id="app" class="loading">
Carregando checklists...
</div>

<script>

const API_KEY = '3b120e2d0d7f28b68c09a418636ca6c4';
const TOKEN = 'ATTAbbf693b04c477c2c1b7ad9e28c35cd6379692f7c3e6ee779012048b14f8f31522F597137';

const t = TrelloPowerUp.iframe();

async function carregar(){

    try{

        const card = await t.card('id','name');

        const response = await fetch(
            `https://api.trello.com/1/cards/${card.id}/checklists?key=${API_KEY}&token=${TOKEN}`
        );

        const checklists = await response.json();

        renderizar(checklists);

        t.sizeTo('body');

    }catch(err){

        document.getElementById('app').innerHTML =
            '<pre>' + err.message + '</pre>';

    }

}

function renderizar(checklists){

    const app = document.getElementById('app');

    app.innerHTML = '';

    if(!checklists.length){

        app.innerHTML =
            '<div class="empty">Nenhum checklist encontrado.</div>';

        return;
    }

    checklists.forEach(checklist => {

        let html = '';

        html += `
            <div class="checklist">

                <div class="checklist-title">
                    📋 ${checklist.name}
                </div>

                <div class="progress">
                    ${checklist.checkItems.length} itens
                </div>
        `;

        const items = checklist.checkItems;

        for(let i = 0; i < items.length; i++){

            const item = items[i];

            if(item.name.startsWith('↳')){
                continue;
            }

            html += `
                <div class="task">

                    <div class="task-header">
                        <div class="task-name">
                            ${item.state === 'complete' ? '✅' : '☐'}
                            ${escapeHtml(item.name)}
                        </div>
                    </div>

                    <div class="subtasks">
            `;

            let j = i + 1;

            while(
                j < items.length &&
                items[j].name.startsWith('↳')
            ){

                html += `
                    <div class="subtask">
                        ${items[j].state === 'complete' ? '✅' : '☐'}
                        ${escapeHtml(
                            items[j].name.replace(/^↳\s*/, '')
                        )}
                    </div>
                `;

                j++;
            }

            html += `
                    </div>
                </div>
            `;

        }

        html += `</div>`;

        app.innerHTML += html;

    });

}

function escapeHtml(text){

    return text
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');

}

carregar();

</script>

</body>
</html>
