<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sublistas Grátis</title>
  <!-- CORREÇÃO: Endereço completo da biblioteca do Trello -->
  <script src="https://trellocdn.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #172b4d; font-size: 14px; margin: 0; padding: 10px; }
    .subtask-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #00000014; }
    .subtask-item.done span { text-decoration: line-through; color: #6b778c; }
    .input-box { display: flex; margin-bottom: 15px; gap: 8px; }
    input[type="text"] { flex-grow: 1; padding: 6px; border: 1px solid #dfe1e6; border-radius: 3px; }
    button { background-color: #0079bf; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #026aa7; }
    .btn-del { background-color: #eb5a46; padding: 2px 6px; font-size: 11px; }
    .btn-del:hover { background-color: #cf513d; }
  </style>
</head>
<body>

  <div class="input-box">
    <input type="text" id="new-subtask" placeholder="Adicionar nova subtarefa aninhada...">
    <button onclick="addSubtask()">+</button>
  </div>
  <div id="subtasks-container"></div>

  <script>
    // Inicializa a instância do Power-Up do Trello
    var t = TrelloPowerUp.initialize({
      'card-back-section': function(t, options) {
        return {
          title: 'Sublistas Personalizadas',
          // CORREÇÃO: Link de ícone válido para não ser bloqueado
          icon: 'https://amazonaws.com',
          // CORREÇÃO: URL direta do seu deploy sem o comando signUrl
          content: { type: 'iframe', url: 'https://github.io', height: 250 }
        };
      }
    });

    var cardContext = null;

    // Carrega as tarefas salvas no cartão atual usando t.get()
    t.render(function() {
      return t.card('id')
        .then(function(card) {
          cardContext = card.id;
          return t.get(cardContext, 'shared', 'items', []);
        })
        .then(renderList);
    });

    function renderList(items) {
      var container = document.getElementById('subtasks-container');
      container.innerHTML = '';
      items.forEach(function(item, index) {
        var div = document.createElement('div');
        div.className = 'subtask-item' + (item.done ? ' done' : '');
        div.innerHTML = `
          <label>
            <input type="checkbox" ${item.done ? 'checked' : ''} onclick="toggleTask(${index})">
            <span>${item.text}</span>
          </label>
          <button class="btn-del" onclick="deleteTask(${index})">Excluir</button>
        `;
        container.appendChild(div);
      });
    }

    function addSubtask() {
      var input = document.getElementById('new-subtask');
      if (!input.value.trim()) return;

      t.get(cardContext, 'shared', 'items', [])
        .then(function(items) {
          items.push({ text: input.value, done: false });
          return t.set(cardContext, 'shared', 'items', items);
        })
        .then(function() {
          input.value = '';
        });
    }

    function toggleTask(index) {
      t.get(cardContext, 'shared', 'items', [])
        .then(function(items) {
          items[index].done = !items[index].done;
          return t.set(cardContext, 'shared', 'items', items);
        });
    }

    function deleteTask(index) {
      t.get(cardContext, 'shared', 'items', [])
        .then(function(items) {
          items.splice(index, 1);
          return t.set(cardContext, 'shared', 'items', items);
        });
    }
  </script>
</body>
</html>
