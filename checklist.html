<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste API Trello</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:10px;
    margin:0;
    background:transparent;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
    font-size:12px;
    background:#f4f5f7;
    padding:10px;
    border-radius:5px;
    max-height:500px;
    overflow:auto;
}
</style>

</head>
<body>

<h3>Teste API Trello</h3>

<div id="status">Carregando...</div>

<pre id="resultado"></pre>

<script>

const API_KEY = '3b120e2d0d7f28b68c09a418636ca6c4';
const TOKEN = 'ATTAbbf693b04c477c2c1b7ad9e28c35cd6379692f7c3e6ee779012048b14f8f31522F597137';

const t = TrelloPowerUp.iframe();

async function iniciar(){

    try{

        document.getElementById('status').innerText =
            'Obtendo cartão...';

        const card = await t.card('id','name');

        document.getElementById('status').innerText =
            'Cartão encontrado: ' + card.name;

        const url =
            `https://api.trello.com/1/cards/${card.id}/checklists?key=${API_KEY}&token=${TOKEN}`;

        const response = await fetch(url);

        const data = await response.json();

        document.getElementById('resultado').textContent =
            JSON.stringify({
                card: card,
                checklists: data
            }, null, 2);

        t.sizeTo('body');

    }
    catch(err){

        document.getElementById('status').innerText =
            'ERRO';

        document.getElementById('resultado').textContent =
            err.stack || err.message || JSON.stringify(err,null,2);

    }

}

iniciar();

</script>

</body>
</html>
