<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DeepLists Clone V3.1</title>

<script src="https://p.trellocdn.com/power-up.min.js"></script>

<style>

body{
    margin:0;
    padding:12px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#fff;
    color:#172b4d;
}

.checklist{
    margin-bottom:24px;
}

.checklist-title{
    font-size:17px;
    font-weight:600;
    margin-bottom:12px;
    border-bottom:1px solid #dfe1e6;
    padding-bottom:8px;
}

.task{
    background:#f4f5f7;
    border-radius:8px;
    margin-bottom:8px;
    overflow:hidden;
}

.task.completed{
    background:#e3fcef;
}

.task-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
}

.task-left{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    flex:1;
}

.arrow{
    font-size:12px;
    width:14px;
}

.task-name{
    font-weight:500;
}

.counter{
    color:#5e6c84;
    font-size:12px;
    margin-left:6px;
}

.btn{
    border:none;
    border-radius:4px;
    cursor:pointer;
    padding:5px 10px;
}

.btn-add{
    background:#0079bf;
    color:white;
}

.btn-del{
    background:#eb5a46;
    color:white;
}

.subtasks{
    padding:0 12px 12px 34px;
}

.subtask{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:4px 0;
}

.subtask-left{
    display:flex;
    align-items:center;
    gap:8px;
}

.new-subtask{
    margin-top:8px;
}

.new-subtask input{
    width:100%;
    padding:8px;
    box-sizing:border-box;
    border:1px solid #dfe1e6;
    border-radius:4px;
    margin-bottom:6px;
}

.empty{
    color:#5e6c84;
    font-style:italic;
    padding:6px 0;
}

</style>
</head>
<body>

<div id="app">Carregando...</div>

<script>

const API_KEY = '3b120e2d0d7f28b68c09a418636ca6c4';
const TOKEN = 'ATTA5a6eeba5755e938a555f9dd37ef28f27dfeb9659e9b13a13708f9bb8c13b86348D3EDE3F';

const t = TrelloPowerUp.iframe();

let cardId = null;

async function getData(){
    return await t.get(
        'card',
        'shared',
        'deeplists',
        {
            subtasks:{},
            collapsed:{}
        }
    );
}

async function saveData(data){
    await t.set(
        'card',
        'shared',
        'deeplists',
        data
    );
}

async function toggleCollapse(parentId){

    const data = await getData();

    data.collapsed[parentId] =
        !data.collapsed[parentId];

    await saveData(data);

    carregar();
}

async function togglePai(parentId){

    const data = await getData();

    const lista =
        data.subtasks[parentId] || [];

    if(lista.length === 0){
        return;
    }

    const todas =
        lista.every(x => x.done);

    lista.forEach(sub=>{
        sub.done = !todas;
    });

    await saveData(data);

    await atualizarPai(parentId);

    carregar();
}

async function adicionarSubtarefa(parentId){

    const campo =
        document.getElementById(
            'new_' + parentId
        );

    const nome =
        campo.value.trim();

    if(!nome) return;

    const data =
        await getData();

    if(!data.subtasks[parentId]){
        data.subtasks[parentId]=[];
    }

    data.subtasks[parentId].push({
        id:Date.now().toString(),
        text:nome,
        done:false
    });

    await saveData(data);

    carregar();
}

async function excluirSub(parentId,subId){

    const data =
        await getData();

    data.subtasks[parentId] =
        (data.subtasks[parentId]||[])
        .filter(x=>x.id!==subId);

    await saveData(data);

    await atualizarPai(parentId);

    carregar();
}

async function toggleSub(parentId,subId){

    const data =
        await getData();

    const lista =
        data.subtasks[parentId] || [];

    const sub =
        lista.find(
            x=>x.id===subId
        );

    sub.done = !sub.done;

    await saveData(data);

    await atualizarPai(parentId);

    carregar();
}

async function atualizarPai(parentId){

    const data =
        await getData();

    const lista =
        data.subtasks[parentId] || [];

    if(lista.length===0){
        return;
    }

    const todas =
        lista.every(x=>x.done);

    await fetch(
        `https://api.trello.com/1/cards/${cardId}/checkItem/${parentId}?state=${todas?'complete':'incomplete'}&key=${API_KEY}&token=${TOKEN}`,
        {
            method:'PUT'
        }
    );
}

async function carregar(){

    const card =
        await t.card('id');

    cardId = card.id;

    const response =
        await fetch(
            `https://api.trello.com/1/cards/${card.id}/checklists?key=${API_KEY}&token=${TOKEN}`
        );

    const checklists =
        await response.json();

    const data =
        await getData();

    const app =
        document.getElementById('app');

    app.innerHTML='';

    checklists.forEach(checklist=>{

        let html='';

        html += `
        <div class="checklist">
            <div class="checklist-title">
                📋 ${checklist.name}
            </div>
        `;

        checklist.checkItems.forEach(item=>{

            const subs =
                data.subtasks[item.id] || [];

            const total =
                subs.length;

            const done =
                subs.filter(
                    x=>x.done
                ).length;

            const collapsed =
                data.collapsed[item.id];

            const completed =
                total>0 &&
                done===total;

            html += `
            <div class="task ${completed?'completed':''}">

                <div class="task-header">

                    <div
                        class="task-left"
                        onclick="toggleCollapse('${item.id}')">

                        <div class="arrow">
                            ${collapsed?'▶':'▼'}
                        </div>

                        <input
                            type="checkbox"
                            ${completed?'checked':''}
                            onclick="
                                event.stopPropagation();
                                togglePai('${item.id}');
                            "
                        >

                        <div class="task-name">
                            ${item.name}
                            <span class="counter">
                                (${done}/${total})
                            </span>
                        </div>

                    </div>

                    <button
                        class="btn btn-add"
                        onclick="
                            event.stopPropagation();
                            document.getElementById('new_${item.id}').focus();
                        ">
                        + Subtarefa
                    </button>

                </div>
            `;

            if(!collapsed){

                html += `
                <div class="subtasks">
                `;

                if(subs.length===0){

                    html += `
                    <div class="empty">
                        Nenhuma subtarefa
                    </div>
                    `;
                }

                subs.forEach(sub=>{

                    html += `
                    <div class="subtask">

                        <div class="subtask-left">

                            <input
                                type="checkbox"
                                ${sub.done?'checked':''}
                                onchange="
                                    toggleSub(
                                        '${item.id}',
                                        '${sub.id}'
                                    )
                                "
                            >

                            <span>
                                ${sub.text}
                            </span>

                        </div>

                        <button
                            class="btn btn-del"
                            onclick="
                                excluirSub(
                                    '${item.id}',
                                    '${sub.id}'
                                )
                            ">
                            X
                        </button>

                    </div>
                    `;
                });

                html += `
                <div class="new-subtask">

                    <input
                        id="new_${item.id}"
                        placeholder="Nova subtarefa..."
                        onkeydown="
                            if(event.key==='Enter'){
                                adicionarSubtarefa('${item.id}');
                            }
                        "
                    >

                    <button
                        class="btn btn-add"
                        onclick="
                            adicionarSubtarefa('${item.id}');
                        ">
                        Salvar
                    </button>

                </div>

                </div>
                `;
            }

            html += `
            </div>
            `;
        });

        html += `
        </div>
        `;

        app.innerHTML += html;
    });

    t.sizeTo('body');
}

carregar();

</script>

</body>
</html>
